<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmpedia Wiki - Index D</title>
  <style>
    body { font-family: Arial, sans-serif; background: #141414; margin: 0; color: white; padding-bottom: 80px; }
    .container { max-width: 1000px; margin: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .navbar { background: #000; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; width: 100%; box-sizing: border-box; }
    .back-btn { background: #222; color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; text-transform: uppercase; }
    .back-btn:hover { background: #ff0000; border-color: #ff0000; }
    header { background: #000; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #333; width: 100%; max-width: 850px; box-sizing: border-box; }
    header h1 { margin: 0; color: #fff; font-size: 28px; text-transform: uppercase; }
    .movie-card { background: #1f1f1f; border: 1px solid #333; border-radius: 8px; padding: 25px; margin-bottom: 25px; width: 100%; max-width: 850px; box-sizing: border-box; display: flex; gap: 30px; justify-content: space-between; }
    .movie-details { flex: 1; }
    .movie-details h2 { margin-top: 0; color: #ff0000; font-size: 24px; text-transform: uppercase; }
    .movie-details p { line-height: 1.6; color: #ccc; font-size: 15px; margin: 8px 0; }
    .movie-poster { width: 200px; height: 285px; object-fit: cover; border-radius: 6px; border: 2px solid #ff0000; background: #262626; }
    .no-movies { color: #666; font-style: italic; margin-top: 40px; font-size: 16px; }
    #dynamicMovies { width: 100%; display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="wiki_filme.html" class="back-btn">← Zurück zur Filme-Zentrale</a>
  </div>
  <div class="container">
    <header><h1>INDEX: BUCHSTABE D</h1></header>
    <div id="dynamicMovies">
      <p class="no-movies" id="emptyMessage">Bisher keine unzensierten Filme unter diesem Buchstaben registriert.</p>
    </div>
  </div>
  <script>
    function ladeDynamischeFilme() {
      const mainContainer = document.getElementById('dynamicMovies');
      const emptyMessage = document.getElementById('emptyMessage');
      const neueFilme = JSON.parse(localStorage.getItem('wikiArtikelFilme')) || [];
      let hatTreffer = false;
      if("D" === "S") {
        hatTreffer = true;
        emptyMessage.style.display = "none";
        const sawCard = document.createElement('div');
        sawCard.className = "movie-card";
        sawCard.innerHTML = `<div class="movie-details"><h2>SAW X (2023)</h2><p><strong>Kategorie:</strong> Uncut-Filmarchiv</p><p><strong>Regie:</strong> Kevin Greutert</p><p><strong>Besetzung:</strong> Tobin Bell, Shawnee Smith</p><p><strong>Handlung:</strong> John Kramer reist nach Mexiko für eine experimentelle Krebstherapie – und nimmt brutale Rache an den Betrügern.</p></div><img class="movie-poster" src="Saw%20X.jpg" alt="Saw X">`;
        mainContainer.appendChild(sawCard);
      }
      neueFilme.forEach(film => {
        if (film.index === "D" && film.name !== "Saw" && film.name !== "SAW X") {
          hatTreffer = true;
          emptyMessage.style.display = "none";
          const card = document.createElement('div');
          card.className = "movie-card";
          let bildSrc = film.poster ? film.poster : "https://unsplash.com";
          let handlungText = film.plot ? film.plot : "Film erfolgreich registriert. Unzensierte Live-Inhalte aktiv.";
          card.innerHTML = `<div class="movie-details"><h2>${film.name.toUpperCase()} (${film.year || 'N/A'})</h2><p><strong>Kategorie:</strong> Uncut-Filmarchiv</p><p><strong>Regie:</strong> ${film.director || 'Unbekannt'}</p><p><strong>Besetzung:</strong> ${film.cast || 'Keine Angabe'}</p><p><strong>Handlung &amp; Details:</strong> ${handlungText}</p></div><img class="movie-poster" src="${bildSrc}" alt="${film.name} Cover">`;
          mainContainer.appendChild(card);
        }
      });
    }
    window.onload = ladeDynamischeFilme;
  </script>
</body>
</html>
