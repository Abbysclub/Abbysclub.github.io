<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmpedia - Darstellerinnen High-Tech Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #141414; margin: 20px; color: white; padding-bottom: 80px; display: none; }
    .container { max-width: 800px; margin: auto; background: #1f1f1f; padding: 30px; border-radius: 10px; border: 2px solid #6f42c1; box-shadow: 0 4px 15px rgba(111, 66, 193, 0.4); }
    .back-link { display: inline-block; margin-bottom: 20px; color: #6f42c1; text-decoration: none; font-weight: bold; }
    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
    label { font-weight: bold; color: #6f42c1; font-size: 14px; text-transform: uppercase; }
    input[type="text"] { background: #262626; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
    .save-btn { background: #6f42c1; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; text-transform: uppercase; cursor: pointer; width: 100%; }
    .bot-log { background: #000; border: 1px dashed #6f42c1; padding: 10px; font-family: monospace; font-size: 12px; color: #00ff00; margin-top: 15px; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="wiki_darstellerinnen.html">← Zurück</a>
    <h1 style="margin-top:0; text-transform:uppercase; font-size: 26px; border-bottom: 1px solid #333; padding-bottom: 10px;">👑 DARSTELLERINNEN-BOT</h1>
    <div class="form-group">
      <label>Name der Darstellerin oder IMDb-ID</label>
      <input type="text" id="starName" placeholder="z.B. Bree Olson oder Shawnee Smith">
    </div>
    <button class="save-btn" onclick="botLiveAbruf()">Star live synchronisieren</button>
    <div class="bot-log" id="botLogBox"></div>
  </div>
  <script>
    document.body.style.display = "block";
    function botLiveAbruf() {
      const searchTitle = document.getElementById('starName').value.trim();
      const logBox = document.getElementById('botLogBox');
      const apiKey = "94409cce";
      if(!searchTitle) { alert("Bitte Namen eingeben!"); return; }
      logBox.style.display = 'block'; logBox.innerHTML = `[BOT] Verbinde mit IMDb-Spiegel...<br>`;
      
      window.omdbCallback = function(data) {
        if(data && data.Response === "True") {
          logBox.innerHTML += "<span style='color:#00ff00;'>[BOT-SUCCESS] Alle Daten geladen!</span><br>";
          let coverUrl = (data.Poster && data.Poster !== "N/A") ? data.Poster : "Supergirl.jpg";
          
          let bestehende = JSON.parse(localStorage.getItem('wikiArtikelDarstellerinnen')) || [];
          let ersterBuchstabe = data.Title.charAt(0).toUpperCase();
          bestehende = bestehende.filter(item => item.name.toLowerCase() !== data.Title.toLowerCase());
          
          bestehende.unshift({ 
            name: data.Title, 
            index: ersterBuchstabe, 
            flag: "LIVE-SYNC", 
            poster: coverUrl, 
            year: data.Released || data.Year, 
            genre: data.Genre, 
            plot: data.Plot, 
            uncut: data.Actors 
          });
          
          localStorage.setItem('wikiArtikelDarstellerinnen', JSON.stringify(bestehende));
          logBox.innerHTML += "[BOT-INFO] Erfolgreich im Alphabet verankert!";
        } else { logBox.innerHTML += "<span style='color:red;'>Nicht gefunden!</span>"; }
        document.getElementById('jsonpScript').remove();
      };
      
      const script = document.createElement('script'); script.id = 'jsonpScript';
      if (searchTitle.startsWith("tt")) {
        script.src = "https://omdbapi.com" + encodeURIComponent(searchTitle) + "&apikey=" + apiKey + "&callback=omdbCallback";
      } else {
        script.src = "https://omdbapi.com" + encodeURIComponent(searchTitle) + "&apikey=" + apiKey + "&callback=omdbCallback";
      }
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
