<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmpedia - Filme-Zentrale</title>
  <style>
    body { font-family: Arial, sans-serif; background: #141414; margin: 0; color: white; padding-bottom: 80px; }
    .container { max-width: 1000px; margin: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    
    .navbar { background: #000; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; width: 100%; box-sizing: border-box; }
    .navbar .logo { font-size: 24px; color: #ff0000; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .back-btn { background: #222; color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; text-transform: uppercase; }
    .back-btn:hover { background: #ff0000; border-color: #ff0000; }

    header { background: linear-gradient(180deg, #000, #1f1f1f); padding: 25px 20px; text-align: center; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; width: 100%; max-width: 700px; box-sizing: border-box; }
    header h1 { margin: 0; color: #fff; font-size: 32px; text-transform: uppercase; }
    
    .create-box { width: 100%; max-width: 700px; margin-bottom: 25px; text-align: center; }
    .create-link-btn { display: block; background: #ff0000; color: white; border: 1px solid #ff3333; padding: 12px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; text-transform: uppercase; box-shadow: 0 0 15px rgba(255,0,0,0.3); transition: 0.2s; }
    .create-link-btn:hover { background: #cc0000; transform: scale(1.02); }

    .az-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin-bottom: 30px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 700px; box-sizing: border-box; }
    .az-btn { background: #262626; color: white; text-decoration: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; border: 1px solid #444; transition: 0.2s; }
    .az-btn:hover { background: #ff0000; border-color: #ff0000; transform: scale(1.1); }
    
    .list-section { background: #1f1f1f; padding: 20px; border-radius: 10px; border: 1px solid #ff0000; width: 100%; max-width: 700px; box-sizing: border-box; }
    .list-title { font-size: 22px; margin-top: 0; color: #ff0000; border-bottom: 2px solid #ff0000; padding-bottom: 5px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
    
    .grid-links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .star-card { background: #262626; padding: 12px; border-radius: 6px; border: 1px solid #333; text-decoration: none; color: white; font-weight: bold; font-size: 15px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .star-card:hover { border-color: #ff0000; background: #2d2d2d; transform: translateY(-2px); }
    
    .letter-badge { background: #ff0000; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
    .new-badge { background: #007bff !important; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">Filmpedia Filme 🎬</div>
    <a href="filmpedia.html" class="back-btn">← Zurück zur Startseite</a>
  </div>

  <div class="container">
    <header>
      <h1>Filme-Zentrale</h1>
    </header>

    <div class="create-box">
      <a href="artikel_film.html" class="create-link-btn">+ Neuen Film-Artikel anlegen</a>
    </div>

    <div class="az-bar">
      <a href="filme_a.html" class="az-btn">A</a> <a href="filme_b.html" class="az-btn">B</a> <a href="filme_c.html" class="az-btn">C</a> <a href="filme_d.html" class="az-btn">D</a> <a href="filme_e.html" class="az-btn">E</a> <a href="filme_f.html" class="az-btn">F</a> <a href="filme_g.html" class="az-btn">G</a> <a href="filme_h.html" class="az-btn">H</a> <a href="filme_i.html" class="az-btn">I</a> <a href="filme_j.html" class="az-btn">J</a> <a href="filme_k.html" class="az-btn">K</a> <a href="filme_l.html" class="az-btn">L</a> <a href="filme_m.html" class="az-btn">M</a> <a href="filme_n.html" class="az-btn">N</a> <a href="filme_o.html" class="az-btn">O</a> <a href="filme_p.html" class="az-btn">P</a> <a href="filme_q.html" class="az-btn">Q</a> <a href="filme_r.html" class="az-btn">R</a> <a href="filme_s.html" class="az-btn">S</a> <a href="filme_t.html" class="az-btn">T</a> <a href="filme_u.html" class="az-btn">U</a> <a href="filme_v.html" class="az-btn">V</a> <a href="filme_w.html" class="az-btn">W</a> <a href="filme_x.html" class="az-btn">X</a> <a href="filme_y.html" class="az-btn">Y</a> <a href="filme_z.html" class="az-btn">Z</a>
    </div>

    <div class="list-section">
      <div class="list-title">📋 Registrierte Filme</div>
      <div class="grid-links" id="movieListContainer"></div>
    </div>
  </div>

  <script>
    // SAw IST HIER DEIN ALLERERSTER OFFIZIELLER FILM!
    let basisDaten = [
      { name: "Saw", index: "S", link: "filme_s.html" }
    ];
    let gespeicherteFilme = JSON.parse(localStorage.getItem('wikiArtikelFilme')) || [];
    let kompletteListe = [...gespeicherteFilme, ...basisDaten];
    const container = document.getElementById('movieListContainer');
    kompletteListe.forEach((film, index) => {
      const card = document.createElement('a');
      card.href = film.link;
      card.className = 'star-card';
      if (index === 0) {
        card.innerHTML = `<span>${film.name}</span><span class="letter-badge new-badge">Neu</span>`;
      } else {
        card.innerHTML = `<span>${film.name}</span><span class="letter-badge">Index ${film.index}</span>`;
      }
      container.appendChild(card);
    });
  </script>
</body>
</html>
