<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmpedia - Neuen Film eintragen</title>
  <style>
    body { font-family: Arial, sans-serif; background: #141414; margin: 20px; color: white; padding-bottom: 80px; }
    .container { max-width: 800px; margin: auto; background: #1f1f1f; padding: 30px; border-radius: 10px; border: 1px solid #ff0000; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2); }
    .back-link { display: inline-block; margin-bottom: 20px; color: #ff0000; text-decoration: none; font-weight: bold; }
    .back-link:hover { text-decoration: underline; }
    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
    label { font-weight: bold; color: #ff0000; font-size: 14px; text-transform: uppercase; }
    input[type="text"] { background: #262626; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 15px; }
    input:focus { border-color: #ff0000; outline: none; }
    .save-btn { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; text-transform: uppercase; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
    .save-btn:hover { background: #cc0000; transform: scale(1.02); }
    .wiki-preview { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #444; display: none; }
    .wiki-header-layout { display: flex; gap: 20px; justify-content: space-between; align-items: flex-start; }
    .wiki-text-side { flex: 1; }
    .wiki-image { width: 220px; height: 310px; object-fit: cover; border-radius: 6px; border: 2px solid #ff0000; background: #262626; display: none; }
    .wiki-preview h2 { color: #ff0000; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 25px; font-size: 20px; }
    .wiki-preview p { line-height: 1.6; color: #ccc; font-size: 16px; }
    .bot-log { background: #000; border: 1px dashed #ff0000; padding: 10px; font-family: monospace; font-size: 12px; color: #00ff00; margin-top: 15px; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="wiki_filme.html">← Zurück zur Filme-Zentrale</a>
    <h1 style="margin-top:0; text-transform:uppercase; font-size: 28px; border-bottom: 1px solid #333; padding-bottom: 10px;">Neuen Film im Wiki registrieren</h1>
    
    <div class="form-group">
      <label>Cover-Dateiname</label>
      <input type="text" id="movieImage" placeholder="z.B. Spiral- From the Book of Saw.jpg">
    </div>
    <div class="form-group">
      <label>Name des Films</label>
      <input type="text" id="movieName" placeholder="z.B. Spiral: From the Book of Saw">
    </div>
    <div class="form-group">
      <label>Regisseur & Cast</label>
      <input type="text" id="movieCast" placeholder="z.B. Darren Lynn Bousman | Chris Rock">
    </div>
    <button class="save-btn" onclick="botGesteuertesSpeichern()">Film über Bot-Schnittstelle prüfen &amp; speichern</button>

    <!-- DAS LIVE-PROTOKOLL DES BOTS -->
    <div class="bot-log" id="botLogBox"></div>

    <div class="wiki-preview" id="previewArea">
      <div class="wiki-header-layout">
        <div class="wiki-text-side">
          <h1 id="viewName" style="text-transform: uppercase; margin-top: 0; margin-bottom: 10px; font-size: 32px;"></h1>
          <p style="color:#aaa; margin: 0;"><strong>Kategorie:</strong> Uncut-Filmarchiv</p>
          <p style="color:#aaa; margin: 5px 0 0 0;"><strong>Erscheinungsjahr:</strong> Wird automatisch geladen...</p>
          <p style="color:#aaa; margin: 5px 0 0 0;"><strong>Regie & Cast:</strong> <span id="viewCast"></span></p>
        </div>
        <img class="wiki-image" id="viewImage" src="" alt="Film Cover">
      </div>
      <h2>Handlung & Unzensierte Details</h2>
      <p id="viewPlot" style="font-style: italic; color: #888;">Inhalt wird geladen... (Automatischer IMDb-Bot-Abruf aktiv)</p>
    </div>
  </div>

  <script>
    function botGesteuertesSpeichern() {
      const name = document.getElementById('movieName').value.trim();
      const cast = document.getElementById('movieCast').value.trim();
      let image = document.getElementById('movieImage').value.trim();
      const logBox = document.getElementById('botLogBox');
      
      if(!name) { alert("Bitte gib den Namen des Films ein!"); return; }

      logBox.style.display = 'block';
      logBox.innerHTML = "[BOT] Starte Sicherheits-Schnittstelle...<br>";

      // 1. HACKER-SCHUTZSCHILD IM FORMULAR
      const hackerPattern = /(<script>|DROP TABLE|OR 1=1)/i;
      if (hackerPattern.test(name) || hackerPattern.test(cast) || hackerPattern.test(image)) {
        logBox.innerHTML += "<span style='color:red;'>[BOT-ALARM] HACKER-ANGRIFF ERKANNT! VANDALISMUS-FILTER BLOCKIERT ZUGRIFF!</span>";
        alert("Sicherheits-Verstoß! Der Bot verweigert das Speichern.");
        return;
      }

      // 2. INTELLIGENTE TEXTREINIGUNG (Die Leerzeichen- & Doppelpunkt-Automatik!)
      let bereinigterBildName = image;
      if(bereinigterBildName) {
        logBox.innerHTML += "[BOT] Überprüfe Cover-Dateiname...<br>";
        // Filtert Doppelpunkte raus
        bereinigterBildName = bereinigterBildName.replace(/:/g, "");
        // Tauscht fiese Bindestriche automatisch gegen saubere Leerzeichen aus!
        if (bereinigterBildName.includes("-")) {
          bereinigterBildName = bereinigterBildName.replace(/-/g, " ");
          logBox.innerHTML += "<span style='color:#f1c40f;'>[BOT-INFO] Bindestriche erkannt. Automatisch in Leerzeichen umgewandelt!</span><br>";
        }
      }

      logBox.innerHTML += "[BOT] Daten erfolgreich verifiziert. Artikel wird freigegeben und im A-Z Archiv brennend gesichert.<br>";

      // Speichert in die lokale Liste
      let bestehende = JSON.parse(localStorage.getItem('wikiArtikelFilme')) || [];
      let ersterBuchstabe = name.charAt(0).toUpperCase();
      if (name.toLowerCase().startsWith("the ")) {
        ersterBuchstabe = name.substring(4).charAt(0).toUpperCase();
      }

      if (!bestehende.some(item => item.name === name)) {
        bestehende.unshift({ 
          name: name, 
          index: ersterBuchstabe, 
          link: `filme_${ersterBuchstabe.toLowerCase()}.html` 
        });
        localStorage.setItem('wikiArtikelFilme', JSON.stringify(bestehende));
      }
      
      // Zeigt die Vorschau an
      document.getElementById('viewName').innerText = name;
      document.getElementById('viewCast').innerText = cast ? cast : "Keine Angabe";
      
      const imgElement = document.getElementById('viewImage');
      if(image) { 
        imgElement.src = bereinigterBildName; 
        imgElement.style.display = 'block'; 
        logBox.innerHTML += `[BOT] Nutze sicheren Bildpfad: <strong>${bereinigterBildName}</strong><br>`;
      } else { 
        imgElement.style.display = 'none'; 
      }
      
      document.getElementById('previewArea').style.display = 'block';
    }
  </script>
</body>
</html>
