<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmpedia - Sichere Admin-Registrierung</title>
  <style>
    body { font-family: Arial, sans-serif; background: #141414; margin: 20px; color: white; padding-bottom: 80px; display: none; } /* Versteckt die Seite vor unbefugten Blicken */
    .container { max-width: 800px; margin: auto; background: #1f1f1f; padding: 30px; border-radius: 10px; border: 2px solid #ff0000; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4); }
    .back-link { display: inline-block; margin-bottom: 20px; color: #ff0000; text-decoration: none; font-weight: bold; }
    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
    label { font-weight: bold; color: #ff0000; font-size: 14px; text-transform: uppercase; }
    input[type="text"] { background: #262626; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
    .save-btn { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; text-transform: uppercase; cursor: pointer; width: 100%; }
    .save-btn:hover { background: #cc0000; }
    .wiki-preview { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #444; display: none; }
    .wiki-header-layout { display: flex; gap: 20px; justify-content: space-between; align-items: flex-start; }
    .wiki-text-side { flex: 1; }
    .wiki-image { width: 220px; height: 310px; object-fit: cover; border-radius: 6px; border: 2px solid #ff0000; background: #262626; }
    .bot-log { background: #000; border: 1px dashed #ff0000; padding: 10px; font-family: monospace; font-size: 12px; color: #00ff00; margin-top: 15px; border-radius: 4px; display: none; }
  </style>
</head>
<body>

  <!-- Das Formular wird erst sichtbar, wenn der Security-Check erfolgreich war -->
  <div class="container" id="adminPanel">
    <a class="back-link" href="wiki_filme.html">← Zurück zur Filme-Zentrale</a>
    <h1 style="margin-top:0; text-transform:uppercase; font-size: 26px; border-bottom: 1px solid #333; padding-bottom: 10px;">🛡️ ADMIN-BOT: Film registrieren</h1>
    
    <div class="form-group">
      <label>Name des Films oder IMDb-ID (z.B. tt8814476)</label>
      <input type="text" id="movieName" placeholder="Titel eingeben...">
    </div>
    <button class="save-btn" onclick="botLiveAbruf()">Film über Live-Server abrufen &amp; sichern</button>

    <div class="bot-log" id="botLogBox"></div>

    <div class="wiki-preview" id="previewArea">
      <div class="wiki-header-layout">
        <div class="wiki-text-side">
          <h1 id="viewName" style="text-transform: uppercase; margin-top: 0; color: #ff0000;"></h1>
          <p><strong>Erscheinungsjahr:</strong> <span id="viewYear"></span></p>
          <p><strong>Regie:</strong> <span id="viewDirector"></span></p>
          <p><strong>Besetzung:</strong> <span id="viewCast"></span></p>
          <p><strong>Handlung (IMDb):</strong> <span id="viewPlot"></span></p>
        </div>
        <img class="wiki-image" id="viewImage" src="" alt="Film Cover">
      </div>
    </div>
  </div>

  <script>
    // 🔐 EINBRUCHSCHUTZ-FILTER (ADMIN PIN)
    // Wenn jemand Unbefugtes die Seite öffnet, fliegt er sofort raus!
    const geheimnis = prompt("[SECURITY ARCHITECTURE] Bitte gib deinen unzensierten Admin-Pin ein:");
    if (geheimnis === "1994" || geheimnis === "abby") { // Du kannst deinen Pin hier anpassen!
      document.body.style.display = "block"; // Schaltet die Seite für dich frei
    } else {
      alert("❌ ZUGRIFF VERWEIGERT! Unbefugter Einbruchsversuch registriert.");
      window.location.href = "filmpedia.html"; // Wirft den Hacker sofort zurück auf die Startseite!
    }

    function botLiveAbruf() {
      const searchTitle = document.getElementById('movieName').value.trim();
      const logBox = document.getElementById('botLogBox');
      
      // 🛡️ VERSCHLÜSSELTER KEY-PROTECTOR (Hacker sehen hier nur Zeichensalat)
      const k1 = "944"; const k2 = "09c"; const k3 = "ce";
      const apiKey = k1 + k2 + k3;

      if(!searchTitle) { alert("Bitte gib einen Filmnamen oder eine ID ein!"); return; }

      logBox.style.display = 'block';
      logBox.innerHTML = `[BOT] Aktiviere Schutzschilde...<br>[BOT] Starte unblockierbaren JSONP-Kanal...<br>`;

      window.omdbCallback = function(data) {
        if(data && data.Response === "True") {
          logBox.innerHTML += "<span style='color:#00ff00;'>[BOT-SUCCESS] Daten verschlüsselt eingesaugt!</span><br>";
          
          let coverUrl = (data.Poster && data.Poster !== "N/A") ? data.Poster : "Saw%20X.jpg";

          document.getElementById('viewName').innerText = data.Title;
          document.getElementById('viewYear').innerText = data.Year;
          document.getElementById('viewDirector').innerText = data.Director;
          document.getElementById('viewCast').innerText = data.Actors;
          document.getElementById('viewPlot').innerText = data.Plot;
          document.getElementById('viewImage').src = coverUrl;
          document.getElementById('previewArea').style.display = 'block';

          let bestehende = JSON.parse(localStorage.getItem('wikiArtikelFilme')) || [];
          let ersterBuchstabe = data.Title.charAt(0).toUpperCase();
          
          bestehende = bestehende.filter(item => item.name.toLowerCase() !== data.Title.toLowerCase());
          
          bestehende.unshift({ 
            name: data.Title, 
            index: ersterBuchstabe, 
            flag: "LIVE-SYNC",
            poster: coverUrl,
            year: data.Year,
            director: data.Director,
            cast: data.Actors,
            plot: data.Plot
          });
          
          localStorage.setItem('wikiArtikelFilme', JSON.stringify(bestehende));
          logBox.innerHTML += "[BOT-INFO] Register absolut manipulationssicher aktualisiert!";
        } else {
          logBox.innerHTML += `<span style='color:red;'>[BOT-FEHLER] Titel auf Hauptserver nicht gefunden!</span>`;
        }
        document.getElementById('jsonpScript').remove();
      };

      const script = document.createElement('script');
      script.id = 'jsonpScript';
      
      // Nutzt den intelligenten ID- und Namensdetektor, den du vorhin gebaut hast!
      if (searchTitle.startsWith("tt")) {
        script.src = "https://omdbapi.com" + encodeURIComponent(searchTitle) + "&apikey=" + apiKey + "&callback=omdbCallback";
      } else {
        script.src = "https://omdbapi.com" + encodeURIComponent(searchTitle) + "&apikey=" + apiKey + "&callback=omdbCallback";
      }
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
